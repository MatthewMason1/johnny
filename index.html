<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WASD Movement</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #ffffff;
    }

    #camera {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    #world {
      position: absolute;
      width: 2000px;
      height: 2000px;
    }

    #player {
      position: absolute;
      width: 140px;
      height: 140px;
      image-rendering: pixelated;
      z-index: 2;
    }

    #building {
      position: absolute;
      width: 220px;
      height: 150px;
      image-rendering: pixelated;
      z-index: 3;
    }

    #bunny {
      position: absolute;
      width: 140px;
      height: 140px;
      image-rendering: pixelated;
      z-index: 2;
    }

    #pencil {
      position: absolute;
      width: 40px;
      height: 100px;
      image-rendering: pixelated;
      z-index: 3;
    }
  </style>
</head>

<body>

<div id="camera">
  <div id="world">
    <img id="player" src="johnnyidle.gif">
    <img id="building" src="building_1.png">
    <img id="bunny" src="bunnyidle.gif">
    <img id="pencil" src="pencil_grounded.png">
  </div>
</div>

<script>
const player = document.getElementById("player");
const building = document.getElementById("building");
const world = document.getElementById("world");
const pencil = document.getElementById("pencil");

// =====================
let x = 100;
let y = 100;
const speed = 6;

const buildingX = -600;
const buildingY = 20;
const buildingW = 500;
const buildingH = 350;

const pencilX = 650;
const pencilY = 500;

let camX = 0;
let camY = 0;

const keys = {};

// =====================
const gifs = {
  idle: "johnnyidle.gif",
  up: "johnnywalk_up.gif",
  down: "johnnywalk_down.gif",
  left: "johnnywalk_left.gif",
  right: "johnnywalk_right.gif"
};

let currentAnim = "idle";

function setAnim(anim) {
  if (currentAnim === anim) return;
  player.src = gifs[anim];
  currentAnim = anim;
}

// =====================
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function checkBuilding(nx, ny, bx, by, bw, bh, offset) {
  const footX = nx + 70;
  const footY = ny + 130;

  return (
    footX > bx &&
    footX < bx + bw &&
    footY > by + bh - offset &&
    footY < by + bh + 40
  );
}

function isColliding(nx, ny) {
  return checkBuilding(nx, ny, buildingX, buildingY, buildingW, buildingH, 30);
}

// =====================
building.style.left = buildingX + "px";
building.style.top = buildingY + "px";
building.style.width = buildingW + "px";
building.style.height = buildingH + "px";

pencil.style.left = pencilX + "px";
pencil.style.top = pencilY + "px";

// =====================
// 🐰 BUNNY
// =====================
const bunny = document.getElementById("bunny");

let bx = 700;
let by = 400;

let bdx = 0;
let bdy = 0;

const bunnySpeed = 1.5;
const fleeSpeed = 4;

let bunnyTimer = 0;

const bunnyGifs = {
  idle: "bunnyidle.gif",
  up: "bunnywalk_up.gif",
  down: "bunnywalk_down.gif",
  left: "bunnywalk_left.gif",
  right: "bunnywalk_right.gif"
};

let bunnyAnim = "idle";

function setBunnyAnim(anim) {
  if (bunnyAnim === anim) return;
  bunny.src = bunnyGifs[anim];
  bunnyAnim = anim;
}

function bunnyNearBuilding(nx, ny) {
  const padding = 80;

  return (
    nx > buildingX - padding &&
    nx < buildingX + buildingW + padding &&
    ny > buildingY - padding &&
    ny < buildingY + buildingH + padding
  );
}

// =====================
function update() {

  let dx = 0;
  let dy = 0;
  let anim = "idle";

  if (keys["w"]) { dy -= 1; anim = "up"; }
  if (keys["s"]) { dy += 1; anim = "down"; }
  if (keys["a"]) { dx -= 1; anim = "left"; }
  if (keys["d"]) { dx += 1; anim = "right"; }

  if (dx || dy) {
    const len = Math.hypot(dx, dy);
    dx = (dx / len) * speed;
    dy = (dy / len) * speed;

    if (!isColliding(x + dx, y)) x += dx;
    if (!isColliding(x, y + dy)) y += dy;

    setAnim(anim);
  } else {
    setAnim("idle");
  }

  player.style.left = x + "px";
  player.style.top = y + "px";

  // depth (ONLY building 1 now)
  const footY = y + 130;
  let z = 3;

  if (footY > buildingY + buildingH) {
    z = 6;
  }

  player.style.zIndex = z;

  // camera
  const targetCamX = x - window.innerWidth / 2 + 70;
  const targetCamY = y - window.innerHeight / 2 + 70;

  camX += (targetCamX - camX) * 0.08;
  camY += (targetCamY - camY) * 0.08;

  world.style.transform = `translate(${-camX}px, ${-camY}px)`;

  // =====================
  // 🐰 BUNNY AI
  // =====================
  bunnyTimer++;

  const distToPlayer = Math.hypot(x - bx, y - by);

  if (bunnyTimer % 80 === 0 && distToPlayer > 180) {
    const angle = Math.random() * Math.PI * 2;
    bdx = Math.cos(angle) * bunnySpeed;
    bdy = Math.sin(angle) * bunnySpeed;
  }

  if (distToPlayer < 180) {
    const angle = Math.atan2(by - y, bx - x);
    bdx = Math.cos(angle) * fleeSpeed;
    bdy = Math.sin(angle) * fleeSpeed;
  }

  let nextX = bx + bdx;
  let nextY = by + bdy;

  let bAnim = "idle";

  if (Math.abs(bdx) > Math.abs(bdy)) {
    bAnim = bdx > 0 ? "right" : "left";
  } else {
    bAnim = bdy > 0 ? "down" : "up";
  }

  if (Math.hypot(bdx, bdy) < 0.2) bAnim = "idle";

  setBunnyAnim(bAnim);

  if (!bunnyNearBuilding(nextX, by)) bx = nextX;
  else bdx *= -1;

  if (!bunnyNearBuilding(bx, nextY)) by = nextY;
  else bdy *= -1;

  bunny.style.left = bx + "px";
  bunny.style.top = by + "px";

  requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
