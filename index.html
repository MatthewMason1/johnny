<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WASD Movement</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #ffffff;
    }

    #camera {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    #world {
      position: absolute;
      width: 2000px;
      height: 2000px;
    }

    #player {
      position: absolute;
      width: 140px;
      height: 140px;
      image-rendering: pixelated;
      z-index: 2;
    }

    #wall {
      position: absolute;
      width: 170px;
      height: 170px;
      image-rendering: pixelated;
      z-index: 3;
    }

    #bunny {
      position: absolute;
      width: 100px;
      height: 100px;
      image-rendering: pixelated;
      z-index: 4;
    }


    /* ✏️ NEW PENCIL */
    #pencil {
      position: absolute;
      width: 40px;
      height: 100px;
      image-rendering: pixelated;
      z-index: 3;
    }
  </style>
</head>

<body>

<div id="camera">
  <div id="world">
    <img id="player" src="johnnyidle.gif">
    <img id="wall" src="testwall.png">
    <img id="bunny" src="bunny.png">
    <img id="pencil" src="pencil_grounded.png">
  </div>
</div>

<script>
const player = document.getElementById("player");
const wall = document.getElementById("wall");
const world = document.getElementById("world");
const pencil = document.getElementById("pencil");

// =====================
// WORLD SETTINGS (UNCHANGED)
// =====================
let x = 100;
let y = 100;
const speed = 6;

const wallX = 400;
const wallY = 200;
const wallW = 200;
const wallH = 200;
// ✏️ pencil position (NEW)
const pencilX = 650;
const pencilY = 500;

// camera
let camX = 0;
let camY = 0;

// input
const keys = {};

// animations
const gifs = {
  idle: "johnnyidle.gif",
  up: "johnnywalk_up.gif",
  down: "johnnywalk_down.gif",
  left: "johnnywalk_left.gif",
  right: "johnnywalk_right.gif"
};

let currentAnim = "idle";

function setAnim(anim) {
  if (currentAnim === anim) return;
  player.src = gifs[anim];
  currentAnim = anim;
}

// input
document.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

// collision (UNCHANGED)
function isColliding(nx, ny) {
  const padding = 20;

  const p = {
    left: nx + 50 - padding,
    right: nx + 40 - padding,
    top: ny + 40 - padding,
    bottom: ny + 70 - padding
  };

  const w = {
    left: wallX,
    right: wallX + wallW,
    top: wallY,
    bottom: wallY + wallH
  };

  return !(
    p.right < w.left ||
    p.left > w.right ||
    p.bottom < w.top ||
    p.top > w.bottom
  );
}

// wall placement
wall.style.left = wallX + "px";
wall.style.top = wallY + "px";
wall.style.width = wallW + "px";
wall.style.height = wallH + "px";

// ✏️ pencil placement (NEW)
pencil.style.left = pencilX + "px";
pencil.style.top = pencilY + "px";



// =====================
// 🐰 BUNNY SYSTEM (FIXED ONLY)
// =====================

// IMPORTANT: defined ONCE (not inside update)
const bunny = document.getElementById("bunny");

let bx = 700;
let by = 400;

let bdx = 0;
let bdy = 0;

const bunnySpeed = 1.5;
const fleeSpeed = 4;

let bunnyTimer = 0;

function bunnyNearWall(nx, ny) {
  const padding = 80;

  return (
    nx > wallX - padding &&
    nx < wallX + wallW + padding &&
    ny > wallY - padding &&
    ny < wallY + wallH + padding
  );
}

// =====================
// GAME LOOP
// =====================
function update() {

  // =====================
  // JOHNNY (UNCHANGED LOGIC)
  // =====================
  let dx = 0;
  let dy = 0;
  let anim = "idle";

  if (keys["w"]) { dy -= 1; anim = "up"; }
  if (keys["s"]) { dy += 1; anim = "down"; }
  if (keys["a"]) { dx -= 1; anim = "left"; }
  if (keys["d"]) { dx += 1; anim = "right"; }

  if (dx !== 0 || dy !== 0) {
    const len = Math.hypot(dx, dy);
    dx = (dx / len) * speed;
    dy = (dy / len) * speed;

    if (!isColliding(x + dx, y)) x += dx;
    if (!isColliding(x, y + dy)) y += dy;

    setAnim(anim);
  } else {
    setAnim("idle");
  }

  player.style.left = x + "px";
  player.style.top = y + "px";

  // depth (UNCHANGED)
  if (y + 140 < wallY + 100) {
    player.style.zIndex = 2;
  } else {
    player.style.zIndex = 6;
  }

  // camera (UNCHANGED)
  const targetCamX = x - window.innerWidth / 2 + 70;
  const targetCamY = y - window.innerHeight / 2 + 70;

  camX += (targetCamX - camX) * 0.08;
  camY += (targetCamY - camY) * 0.08;

  world.style.transform = `translate(${-camX}px, ${-camY}px)`;

  // =====================
  // 🐰 BUNNY AI (FIXED + WORKING)
  // =====================

  bunnyTimer++;

  const distToPlayer = Math.hypot(x - bx, y - by);

  // random movement
  if (bunnyTimer % 80 === 0 && distToPlayer > 180) {
    const angle = Math.random() * Math.PI * 2;
    bdx = Math.cos(angle) * bunnySpeed;
    bdy = Math.sin(angle) * bunnySpeed;
  }

  // flee player
  if (distToPlayer < 180) {
    const angle = Math.atan2(by - y, bx - x);
    bdx = Math.cos(angle) * fleeSpeed;
    bdy = Math.sin(angle) * fleeSpeed;
  }

  let nextX = bx + bdx;
  let nextY = by + bdy;

  // wall avoidance
  if (!bunnyNearWall(nextX, by)) bx = nextX;
  else bdx *= -1;

  if (!bunnyNearWall(bx, nextY)) by = nextY;
  else bdy *= -1;

  bunny.style.left = bx + "px";
  bunny.style.top = by + "px";

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
